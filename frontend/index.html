<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>25音乐</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Ccircle cx='32' cy='32' r='30' fill='%23c62f2f'/%3E%3Cpath d='M 18 34 C 18 20, 46 20, 46 34' stroke='white' stroke-width='3' fill='none' stroke-linecap='round'/%3E%3Crect x='14' y='32' width='8' height='14' rx='3' fill='white'/%3E%3Crect x='42' y='32' width='8' height='14' rx='3' fill='white'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <!-- 左侧导航栏 -->
    <aside class="sidebar">
        <div class="sidebar-nav">
            <div class="nav-item" data-page="search" onclick="navigateTo('search')">
                <div class="nav-icon">🔍</div>
                <span>搜索</span>
            </div>
            <div class="nav-item active" data-page="playing" onclick="navigateTo('playing')">
                <div class="nav-icon">🎵</div>
                <span>正在播放</span>
            </div>
            <div class="nav-item" data-page="playlist" onclick="navigateTo('playlist')">
                <div class="nav-icon">📋</div>
                <span>播放列表</span>
            </div>
            <div class="nav-item" data-page="history" onclick="navigateTo('history')">
                <div class="nav-icon">🕐</div>
                <span>播放历史</span>
            </div>
            <div class="nav-item" data-page="favorites" onclick="navigateTo('favorites')">
                <div class="nav-icon">❤️</div>
                <span>我的收藏</span>
            </div>
        </div>
        <div class="sidebar-footer">
            <span>仅供技术学习</span>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-container">
        <div id="app"></div>
    </main>

    <!-- 底部播放器 -->
    <footer class="player-bar"></footer>

    <!-- JavaScript模块 -->
    <!-- 基础工具 -->
    <script src="js/utils.js"></script>
    <script src="js/state.js"></script>
    
    <!-- API与音频 -->
    <script src="js/api.js"></script>
    <script src="js/audio.js"></script>
    
    <!-- 模板系统 -->
    <script src="js/templates/empty-states.js"></script>
    <script src="js/templates/song-table.js"></script>
    <script src="js/templates/player.js"></script>
    
    <!-- 事件管理 -->
    <script src="js/events/table-events.js"></script>
    <script src="js/events/player-events.js"></script>
    <script src="js/events/search-events.js"></script>
    
    <!-- 页面渲染器 -->
    <script src="js/pages/playlist.js"></script>
    <script src="js/pages/search.js"></script>
    <script src="js/pages/favorites.js"></script>
    <script src="js/pages/history.js"></script>
    <script src="js/pages/playing.js"></script>
    
    <!-- 业务模块 -->
    <script src="js/search.js"></script>
    <script src="js/playlist.js"></script>
    <script src="js/favorites.js"></script>
    <script src="js/history.js"></script>
    
    <!-- UI核心管理器 -->
    <script src="js/ui.js"></script>
    
    <!-- 应用入口 -->
    <script src="js/app.js"></script>
</body>
</html>
